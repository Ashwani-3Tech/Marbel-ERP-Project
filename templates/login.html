<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Marble ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg border-0" style="width: 400px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold mb-4">Marble ERP</h3>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger py-2">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Login to Dashboard</button>
            </form>
        </div>
    </div>

</body>
</html>
